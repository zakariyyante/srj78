<svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cg" x1="14" y1="13" x2="34" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="bg" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#130d2e"/>
      <stop offset="100%" stop-color="#060412"/>
    </radialGradient>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="24" cy="24" r="23.5" fill="url(#bg)"/>

  <!-- Outer gradient ring -->
  <circle cx="24" cy="24" r="22.5" fill="none" stroke="url(#rg)" stroke-width="1.6"/>

  <!-- 12 gem studs -->
  <circle cx="24" cy="1.5" r="1.5" fill="#f59e0b"/>
  <circle cx="35.5" cy="4.6" r="1.1" fill="#8b5cf6"/>
  <circle cx="43.4" cy="13" r="1.1" fill="#8b5cf6"/>
  <circle cx="46.5" cy="24" r="1.5" fill="#f59e0b"/>
  <circle cx="43.4" cy="35" r="1.1" fill="#8b5cf6"/>
  <circle cx="35.5" cy="43.4" r="1.1" fill="#8b5cf6"/>
  <circle cx="24" cy="46.5" r="1.5" fill="#f59e0b"/>
  <circle cx="12.5" cy="43.4" r="1.1" fill="#8b5cf6"/>
  <circle cx="4.6" cy="35" r="1.1" fill="#8b5cf6"/>
  <circle cx="1.5" cy="24" r="1.5" fill="#f59e0b"/>
  <circle cx="4.6" cy="13" r="1.1" fill="#8b5cf6"/>
  <circle cx="12.5" cy="4.6" r="1.1" fill="#8b5cf6"/>

  <!-- Inner ring -->
  <circle cx="24" cy="24" r="18.5" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.35"/>

  <!-- Crown body -->
  <path d="M14 30 L14 20.5 L18.5 25 L24 13.5 L29.5 25 L34 20.5 L34 30 Z" fill="url(#cg)" filter="url(#g)"/>

  <!-- Crown base bar -->
  <rect x="13" y="29.5" width="22" height="3.8" rx="1.9" fill="url(#cg)" filter="url(#g)"/>

  <!-- Crown peak jewels -->
  <circle cx="14" cy="20.5" r="2.1" fill="#c084fc" filter="url(#g)"/>
  <circle cx="24" cy="13.5" r="2.4" fill="#e879f9" filter="url(#g)"/>
  <circle cx="34" cy="20.5" r="2.1" fill="#c084fc" filter="url(#g)"/>

  <!-- Crown mid jewels -->
  <circle cx="18.5" cy="25" r="1.3" fill="#fde68a" opacity="0.9"/>
  <circle cx="29.5" cy="25" r="1.3" fill="#fde68a" opacity="0.9"/>

  <!-- Crown base diamond -->
  <path d="M24 28 L25.5 30 L24 32 L22.5 30 Z" fill="#f59e0b" filter="url(#g)"/>

  <!-- Sparkles -->
  <path d="M9.5 10 L10 11.8 L11.8 12.3 L10 12.8 L9.5 14.6 L9 12.8 L7.2 12.3 L9 11.8 Z" fill="#c084fc" opacity="0.75"/>
  <path d="M38.5 10 L39 11.8 L40.8 12.3 L39 12.8 L38.5 14.6 L38 12.8 L36.2 12.3 L38 11.8 Z" fill="#fbbf24" opacity="0.75"/>
